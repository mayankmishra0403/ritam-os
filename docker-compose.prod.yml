version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-ritam}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-ritam_prod}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    networks:
      - ritam-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-ritam} -d ${DB_NAME:-ritam_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-ritam-redis-pass}
    volumes:
      - redisdata:/data
    restart: always
    networks:
      - ritam-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${API_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-ritam}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-ritam_prod}
      REDIS_URL: redis://:${REDIS_PASSWORD:-ritam-redis-pass}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      MSG91_AUTH_KEY: ${MSG91_AUTH_KEY}
      MSG91_SENDER_NUMBER: ${MSG91_SENDER_NUMBER}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - ritam-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - api
    restart: always
    networks:
      - ritam-network

volumes:
  pgdata:
  redisdata:

networks:
  ritam-network:
    driver: bridge
